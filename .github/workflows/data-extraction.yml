name: Data Extraction Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scraper_type:
        description: 'Scraper type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - eudamed
          - vigilance
          - clinical
          - certificates
          - fsca
          - ema
          - who
          - cochrane
          - bfarm
          - ansm
          - iss
          - igj
          - aemps
          - nara
          - scenihr
          - economic-operators
          - notified-bodies
          - refused-applications

env:
  NODE_VERSION: '18'

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
        continue-on-error: true

  extract-data:
    name: Extract Data
    runs-on: ubuntu-latest
    needs: lint-and-format
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create output directory
        run: mkdir -p output
      
      - name: Run all scrapers
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper_type == 'all' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:all
      
      - name: Run EUDAMED scrapers
        if: ${{ github.event.inputs.scraper_type == 'eudamed' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:eudamed
      
      - name: Run vigilance scraper
        if: ${{ github.event.inputs.scraper_type == 'vigilance' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:vigilance
      
      - name: Run clinical investigations scraper
        if: ${{ github.event.inputs.scraper_type == 'clinical' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:clinical
      
      - name: Run certificates scraper
        if: ${{ github.event.inputs.scraper_type == 'certificates' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:certificates
      
      - name: Run FSCA scraper
        if: ${{ github.event.inputs.scraper_type == 'fsca' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:fsca
      
      - name: Run EMA scraper
        if: ${{ github.event.inputs.scraper_type == 'ema' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:ema
      
      - name: Run WHO VigiBase scraper
        if: ${{ github.event.inputs.scraper_type == 'who' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:who
      
      - name: Run Cochrane scraper
        if: ${{ github.event.inputs.scraper_type == 'cochrane' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:cochrane
      
      - name: Run BfArM scraper
        if: ${{ github.event.inputs.scraper_type == 'bfarm' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:bfarm
      
      - name: Run ANSM scraper
        if: ${{ github.event.inputs.scraper_type == 'ansm' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:ansm
      
      - name: Run ISS scraper
        if: ${{ github.event.inputs.scraper_type == 'iss' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:iss
      
      - name: Run IGJ scraper
        if: ${{ github.event.inputs.scraper_type == 'igj' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:igj
      
      - name: Run AEMPS scraper
        if: ${{ github.event.inputs.scraper_type == 'aemps' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:aemps
      
      - name: Run NARA scraper
        if: ${{ github.event.inputs.scraper_type == 'nara' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:nara
      
      - name: Run SCENIHR scraper
        if: ${{ github.event.inputs.scraper_type == 'scenihr' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:scenihr
      
      - name: Run economic operators scraper
        if: ${{ github.event.inputs.scraper_type == 'economic-operators' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:eo
      
      - name: Run notified bodies scraper
        if: ${{ github.event.inputs.scraper_type == 'notified-bodies' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:nb
      
      - name: Run refused applications scraper
        if: ${{ github.event.inputs.scraper_type == 'refused-applications' }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run run:refused
      
      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extracted-data
          path: output/
          retention-days: 30
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-logs
          path: |
            *.log
            snowflake.log
          retention-days: 7

  load-to-snowflake:
    name: Load to Snowflake
    runs-on: ubuntu-latest
    needs: extract-data
    if: always() && needs.extract-data.result == 'success'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download extracted data
        uses: actions/download-artifact@v4
        with:
          name: extracted-data
          path: output/
        continue-on-error: true

      - name: Check if data exists
        id: check-data
        run: echo "has-data=$(find output/ -type f | head -1 | wc -l)" >> $GITHUB_OUTPUT

      - name: Load data to Snowflake
        if: steps.check-data.outputs.has-data == '1'
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: npm run load:snowflake

      - name: Skip Snowflake load
        if: steps.check-data.outputs.has-data != '1'
        run: echo "No data to load to Snowflake. The extract-data job may have produced no output."
